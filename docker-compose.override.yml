services:
  hrdb:
    container_name: hrdb
    environment:
     - POSTGRES_USER=postgres
     - POSTGRES_PASSWORD=postgres
     - POSTGRES_DB=HrDb
    restart: always
    ports:
        - "5433:5432"
    volumes:
     - postgres_hrdb:/var/lib/postgresql/data/


  ollama:
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_volume:/root/.ollama

  api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__Database=Host=hrdb; Port=5432; Database=HrDb; Username=postgres; Password=postgres
    ports:
      - "6000:8080"
      - "6060:8081"
    depends_on: 
      - hrdb
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
